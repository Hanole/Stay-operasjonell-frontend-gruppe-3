<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/global.css" />
    <link rel="stylesheet" href="src/pages/index/index.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Profil</title>
  </head>
  <body>
    <header>
      <div class="logo">
        <a href="index.html"
          ><img class="logo-img" src="assets/stay-logo.svg" alt="Stay logo"
        /></a>
      </div>

      <button class="hamburger-button" type="button">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav class="navbar" id="mainNav" aria-label="main navigation">
        <ul>
          <li><a class="navbar-link" href="explore.html">Utforsk</a></li>
          <li><a class="navbar-link" href="bookings.html">Bestillinger</a></li>
          <li><a class="navbar-link" href="index.html">Profil</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="login-section">
        <img
          class="house-img"
          alt="bilde av en hytte ute på landet"
          src="assets/countryhouseimg.jpg"
        />
        <div id="login">
          <h1>Velkommen tilbake</h1>
          <p>Skriv inn påloggingsinformasjonen din for å fortsette</p>
          <form class="login">
            <label for="email-input">E-post addresse</label>
            <input type="text" name="email" />
            <label for="password-input">Passord</label>
            <input type="password" name="Password" />
            <button type="submit">Logg inn</button>
            <p>Har du ikke en konto? Registrer deg her</p>
          </form>
        </div>
      </section>

      <div id="signup" class="hidden">
        <h1>Opprett konto</h1>
        <p>Fyll inn informasjonen din for å opprette konto</p>
        <form class="signup">
          <label for="username-input">Username</label>
          <input type="text" name="username" />
          <label for="email-input">E-post addresse</label>
          <input type="text" name="email" />
          <label for="password-input">Passord</label>
          <input type="password" name="Password" />
          <button type="submit">Opprett konto</button>
          <p>Har du en allerede en konto? Logg inn her</p>
        </form>
      </div>

      <div id="profil" class="hidden">
        <h1>Welcome, (name)</h1>
        <p>Created:</p>
        <p>Updated:</p>
        <form class="profile">
          <label for="username-input">Username</label>
          <input type="text" name="username" />
          <label for="email-input">E-post addresse</label>
          <input type="text" name="email" />
          <label for="password-input">Passord</label>
          <input type="password" name="Password" />
          <button type="submit">Lagre</button>
          <button type="button">Logg ut</button>
          <button type="button">Slett konto</button>
        </form>
      </div>
    </main>

    <script type="module" src="src/main.ts"></script>
  </body>
</html>
