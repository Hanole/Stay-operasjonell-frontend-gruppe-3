<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/src/pages/explore/explore.css" rel="stylesheet" />
    <link href="/src/global.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <title>Explore</title>
</head>
<body>
     <header>
      <div class="logo">
        <a href="index.html"
          ><img class="logo-img" src="assets/stay-logo.svg" alt="Stay logo"
        /></a>
      </div>

      <button class="hamburger-button" type="button">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav class="navbar" id="mainNav" aria-label="main navigation">
        <ul>
          <li><a class="navbar-link" href="explore.html">Utforsk</a></li>
          <li><a class="navbar-link" href="bookings.html">Bestillinger</a></li>
          <li><a class="navbar-link" href="index.html">Profil</a></li>
        </ul>
      </nav>
    </header>
    <main class="explore">
        <section class="explore-hero">
            <h1>Utforsk våre bed & breakfast-rom</h1>
            <p>Se våre tilgjengelige rom, og bruk filtrene i sidebaren for å finne et rom som matcher dine behov.</p>
        </section>
        <section class="explore-filters">
            <form class="explore-filters-form">
                <div class="explore-filters-field field-start"> 
                    <label for="filter-where" class="hidden-label">Where</label> 
                    <input id="filter-where" type="text" placeholder="Hvor vil du reise?">
                </div>
                <div class="explore-filters-field"> 
                    <label for="filter-from" class="hidden-label" >From Date</label>
                    <input id="filter-from" type="text" placeholder="Når vil du reise?" onfocus="this.type='date'">
                </div>
                <div class="explore-filters-field"> 
                    <label for="filter-to" class="hidden-label">To Date</label>
                    <input id="filter-to" type="text" placeholder="Når er reisen over?" onfocus="this.type='date'">
                </div>
                <div class="explore-filters-field"> 
                    <label for="filter-guests" class="hidden-label">Max Guests</label> 
                    <input id="filter-guests" type="number" min="1" max="10" placeholder="Hvor mange blir dere?">
                </div>
                <div class="explore-filters-field field-end"> 
                    <button type="submit">Search</button>
                </div>
            </form>
        </section>
        <section class="explore-filters-chosen">
            <div>

            </div>
        </section>
        <section class="explore-content">
            <div class="explore-rooms">
                
            </div>
            <aside class="explore-sidebar">
                <section class="explore-sidebar-section">
                    <h2>Filter by</h2>
                    <section class="explore-sidebar-features">
                        
                    </section>
                    <button class="explore-sidebar-reset">Nullstill filter</button>
                </section>
                <section class="explore-sidebar-section">
                    <h2>Saved Searches</h2>
                </section>
            </aside>
        </section>
    </main>
    <script type="module" src="/src/pages/explore/explore.ts"></script>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
